<!DOCTYPE html>
<html lang="he" dir="rtl" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>מערכת תמלול תורני מדויק</title>

  <!-- טעינת ספריות חיצוניות (Tailwind, FontAwesome, React, Babel) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- הגדרת מצב הלילה של Tailwind -->
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>

  <!-- הגדרות אנימציות והדפסה -->
  <style>
    @media print {
      body * { visibility: hidden; }
      .print-content, .print-content * { visibility: visible; }
      .print-content { 
        position: absolute; left: 0; top: 0; width: 100%; 
        border: none !important; box-shadow: none !important; background: white !important; color: black !important;
      }
      mark { 
        background-color: #fef08a !important; color: #854d0e !important; 
        -webkit-print-color-adjust: exact; print-color-adjust: exact; 
      }
    }
    
    @keyframes wobble {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    .animate-wobble { animation: wobble 0.6s ease-in-out infinite; }
    
    @keyframes bounce-cute {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(0.95, 1.05); }
    }
    .animate-bounce-cute { animation: bounce-cute 1.2s ease-in-out infinite; }
    
    @keyframes tada {
      0% { transform: scale(1); }
      10%, 20% { transform: scale(0.9) rotate(-3deg); }
      30%, 50%, 70%, 90% { transform: scale(1.15) rotate(3deg); }
      40%, 60%, 80% { transform: scale(1.15) rotate(-3deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .animate-tada { animation: tada 1s ease-in-out; }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }
    .animate-heartbeat { animation: heartbeat 1.5s ease-in-out infinite; }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    
    @keyframes soundwave {
      0%, 100% { height: 0.5rem; opacity: 0.5; }
      50% { height: 2rem; opacity: 1; }
    }
    .animate-wave { animation: soundwave 1.2s ease-in-out infinite; }
    .animate-wave:nth-child(2) { animation-delay: 0.2s; }
    .animate-wave:nth-child(3) { animation-delay: 0.4s; }
    .animate-wave:nth-child(4) { animation-delay: 0.6s; }
    .animate-wave:nth-child(5) { animation-delay: 0.8s; }
    
    /* מראה העורך הסופי */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950">

  <!-- נקודת העגינה של React -->
  <div id="root"></div>

  <!-- לוגיקת האפליקציה ב-React -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // רכיב אייקונים (החלפנו את Lucide ב-FontAwesome לטובת עבודה ללא התקנות)
    const Icon = ({ i, size = 18, className = '', title }) => (
      <i className={`fa-solid fa-${i} ${className}`} style={{ fontSize: `${size}px` }} title={title}></i>
    );

    const fetchWithRetry = async (url, options, retries = 5) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            if (response.status === 400 || response.status === 403) {
                throw new Error(errData.error?.message || "מפתח ה-API שגוי או שאין לו הרשאות למודל זה.");
            }
            throw new Error(`שגיאת רשת: ${response.status}`);
          }
          return await response.json();
        } catch (error) {
          if (i === retries - 1 || error.message.includes("מפתח ה-API")) throw error;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    };

    const MODEL_MAP = {
      'lite': 'gemini-3.1-flash-lite-preview',
      'flash': 'gemini-3-flash-preview',
      'pro': 'gemini-3.1-pro-preview'
    };

    const callGeminiAudio = async (base64Data, mimeType, prompt, modeKey, apiKey, signal) => {
      const modelId = MODEL_MAP[modeKey] || MODEL_MAP['flash'];
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
      
      const systemInstructionText = modeKey === 'pro'
        ? "אתה עוזר וירטואלי מומחה לתמלול טקסטים תורניים, שיעורי תורה, גמרא והלכה. עליך לבצע ניתוח מעמיק, להבין את ההקשר של הסוגיה, לשמור על שפה נקייה ומכובדת, ולדייק בצורה קיצונית במונחים."
        : "אתה עוזר וירטואלי מומחה לתמלול טקסטים תורניים, שיעורי תורה, גמרא והלכה. שמור על שפה נקייה ומכובדת, ודייק במונחים.";

      const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType, data: base64Data } }] }],
        systemInstruction: { parts: [{ text: systemInstructionText }] }
      };
      const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal });
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("לא התקבל טקסט מהמודל (" + modelId + ")");
      return text;
    };

    const callGeminiMerge = async (base64Data, mimeType, prompt, modeKey, apiKey, signal) => {
      const modelId = MODEL_MAP[modeKey] || MODEL_MAP['pro'];
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
      
      const systemText = modeKey === 'pro' 
        ? "אתה מומחה על בעריכת טקסטים תורניים. עליך לפעול כ'מודל חושב' (Reasoning). נתח את הגרסאות צעד-אחר-צעד, האזן לשמע המקורי במקומות בהם יש מחלוקת בין הגרסאות, והפעל שיקול דעת הלכתי עמוק כדי להבין מה הרב באמת אמר. הרכב תמלול סופי, השלם והרציף."
        : "אתה מומחה בעריכת טקסטים תורניים. תפקידך לאחד במהירות מספר תמלולים לכדי תמלול סופי תוך היעזרות בשמע המקורי.";

      const payload = {
        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType, data: base64Data } }] }],
        systemInstruction: { parts: [{ text: systemText }] }
      };
      const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal });
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("לא התקבל טקסט מהבינה המסכמת");
      return text;
    };

    const TypewriterText = ({ text }) => {
      const [displayed, setDisplayed] = useState('');
      const containerRef = useRef(null);

      useEffect(() => {
        if (!text) return;
        let i = 0;
        setDisplayed('');
        const charsPerTick = Math.max(1, Math.floor(text.length / 200)); 
        
        const interval = setInterval(() => {
          setDisplayed(text.substring(0, i));
          i += charsPerTick;
          if (containerRef.current) containerRef.current.scrollTop = containerRef.current.scrollHeight;
          if (i >= text.length) {
            setDisplayed(text);
            clearInterval(interval);
          }
        }, 20);
        return () => clearInterval(interval);
      }, [text]);

      return (
        <div ref={containerRef} className="h-48 overflow-y-auto pr-2 text-sm text-slate-700 dark:text-slate-300 leading-relaxed custom-scrollbar whitespace-pre-wrap">
          {displayed}
          {displayed.length < text?.length && <span className="inline-block w-1.5 h-4 ml-1 bg-blue-500 animate-pulse rounded-full"></span>}
        </div>
      );
    };

    // מגן שגיאות (ErrorBoundary) לתפיסת קריסות שנובעות מהתערבות של תוספי דפדפן
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      componentDidCatch(error, errorInfo) {
        console.error("React Error:", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 p-6 text-center" dir="rtl">
              <Icon i="triangle-exclamation" className="text-6xl text-red-500 mb-6 animate-pulse" />
              <h1 className="text-2xl font-bold mb-2">אופס, אירעה שגיאה בתצוגה</h1>
              <p className="text-slate-600 dark:text-slate-400 mb-8 max-w-md">
                נראה שתוסף דפדפן (כמו תרגום אוטומטי של גוגל או מנהל סיסמאות) התערב בקוד וגרם לקריסה בעת מעבר בין מסכים.
              </p>
              <button onClick={() => window.location.reload()} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 transition-colors">
                רענן עמוד והתחל מחדש
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState('');
      const [isApiKeySet, setIsApiKeySet] = useState(false);

      // עדכון ה-class ברמת ה-html כדי ש-Tailwind יעבוד כראוי עם dark mode
      useEffect(() => {
        if (isDarkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDarkMode]);

      useEffect(() => {
        const savedKey = sessionStorage.getItem('gemini_user_api_key');
        if (savedKey) {
          setApiKeyInput(savedKey);
          setIsApiKeySet(true);
        }
      }, []);

      const handleSaveApiKey = () => {
        if (apiKeyInput.trim().length > 10) {
          sessionStorage.setItem('gemini_user_api_key', apiKeyInput.trim());
          setIsApiKeySet(true);
        } else {
          alert('אנא הזן מפתח API תקין.');
        }
      };

      const handleClearApiKey = () => {
        sessionStorage.removeItem('gemini_user_api_key');
        setApiKeyInput('');
        setIsApiKeySet(false);
      };

      const [file, setFile] = useState(null);
      const [iterations, setIterations] = useState(3);
      
      const [globalAiMode, setGlobalAiMode] = useState('flash'); 
      const [audioModels, setAudioModels] = useState(Array(10).fill('flash'));
      const [mergeModel, setMergeModel] = useState('pro'); 
      
      const [status, setStatus] = useState('idle'); 
      const [showAdvancedPrompts, setShowAdvancedPrompts] = useState(false);
      
      const defaultPromptFast = "אנא תמלל את קובץ השמע המצורף. זהו שיעור תורני. עליך לספק תמלול רציף, מדויק ונאמן למקור ככל הניתן. הקפד לתקן שגיאות כתיב קלות ולשמור על חלוקה הגיונית למשפטים, אך אל תשנה את הניסוח המקורי של הדובר.";
      const defaultPromptDeep = "אנא תמלל את קובץ השמע המצורף. זהו שיעור תורני מעמיק. עליך לפעול מתוך הבנה רחבה של הסוגיה הנדונה, כאילו אתה 'תלמיד חכם' המאזין לשיעור. שים דגש מיוחד על זיהוי נכון של מונחים תלמודיים, ארמית, ראשי תיבות וציטוטים ממקורות (גמרא, ראשונים, אחרונים). אם מילה נשמעת לא ברורה, השתמש בהקשר ההלכתי והלוגי של המשפט כדי להכריע מהי המילה הנכונה ביותר.";
      
      const [audioPrompts, setAudioPrompts] = useState(Array(10).fill(defaultPromptFast));
      const [mergePrompt, setMergePrompt] = useState("");

      useEffect(() => {
        if (mergeModel === 'pro') {
          setMergePrompt("המטרה שלך היא להשוות בין כל הגרסאות השונות, ובו זמנית **להאזין קשב רב לקובץ השמע המקורי המצורף**, כדי להכריע איזו גרסה תואמת בצורה המדויקת ביותר למקור.\n\nעליך ליצור מסמך סופי משולב ורציף.\nחשוב מאוד: חובה עליך להציג את כל שינויי הנוסחאות שעלו מכל הגרסאות השונות! בכל מקום שבו יש הבדל בין הגרסאות, כתוב את המילה או המשפט הנכונים ביותר לדעתך, ומיד אחריהם הוסף את כל האפשרויות השונות שהופיעו בגרסאות האחרות כשהן עטופות בתגית <mark> בלבד (ללא מילות הקדמה כמו 'גרסה אחרת' או סוגריים).\nלדוגמה: 'והנה דין שור תם <mark>שור דם</mark> <mark>שור רם</mark> מובא בגמרא'. \n\nאנא החזר רק את התמלול הסופי (כולל תגיות ה-<mark> המכילות אך ורק את חלופות הטקסט השונות היכן שצריך), ללא שום הקדמות.");
        } else {
          setMergePrompt("המטרה שלך היא לאחד בין הגרסאות השונות במהירות ליצירת טקסט רציף, אחיד וברור.\nהיעזר בקובץ השמע כדי לפתור סתירות בין הגרסאות במידה וישנן, והתעלם משגיאות פליטת קולמוס או שגיאות כתיב אקראיות.\n\nאנא החזר רק את התמלול הסופי בשלמותו. אל תכתוב הערות שוליים, אל תכניס חלופות, ואל תכתוב שום הקדמה.");
        }
      }, [mergeModel]);

      const [drafts, setDrafts] = useState([]);
      const [mergeState, setMergeState] = useState({ status: 'waiting', text: '' }); 
      
      const [timeElapsed, setTimeElapsed] = useState(0);
      const [timeRemaining, setTimeRemaining] = useState(null);
      const [progressPercent, setProgressPercent] = useState(0);
      
      const [finalText, setFinalText] = useState('');
      const [activeTab, setActiveTab] = useState('final'); 
      const [fontSize, setFontSize] = useState(18);
      const [isCopied, setIsCopied] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');

      const fileInputRef = useRef(null);
      const startTimeRef = useRef(null);
      const timerIntervalRef = useRef(null);
      const abortControllerRef = useRef(null);
      const estimatedTotalDurationRef = useRef(null);

      const handleGlobalModelChange = (mode) => {
        setGlobalAiMode(mode);
        setAudioModels(Array(10).fill(mode));
        setAudioPrompts(Array(10).fill(mode === 'pro' ? defaultPromptDeep : defaultPromptFast));
        setMergeModel(mode);
      };

      const updatePromptForIteration = (index, value) => {
        const newPrompts = [...audioPrompts];
        newPrompts[index] = value;
        setAudioPrompts(newPrompts);
      };

      const updateModelForIteration = (index, modelVal) => {
        const newModels = [...audioModels];
        newModels[index] = modelVal;
        setAudioModels(newModels);
        
        const newPrompts = [...audioPrompts];
        newPrompts[index] = modelVal === 'pro' ? defaultPromptDeep : defaultPromptFast;
        setAudioPrompts(newPrompts);
      };

      const formatTime = (seconds) => {
        if (seconds === null || isNaN(seconds) || seconds < 0) return "--:--";
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      useEffect(() => {
        return () => clearInterval(timerIntervalRef.current);
      }, []);

      const handleFileSelect = (e) => {
        const selectedFile = e.target.files[0];
        if (selectedFile) {
          if (!selectedFile.type.startsWith('audio/')) {
            setErrorMessage("אנא העלה קובץ שמע בלבד.");
            return;
          }
          setFile(selectedFile);
          resetState();
        }
      };

      const resetState = () => {
        if (abortControllerRef.current) abortControllerRef.current.abort();
        setStatus('idle');
        setFinalText('');
        setErrorMessage('');
        setDrafts([]);
        setMergeState({ status: 'waiting', text: '' });
        setTimeElapsed(0);
        setTimeRemaining(null);
        setProgressPercent(0);
        setActiveTab('final');
        estimatedTotalDurationRef.current = null;
        clearInterval(timerIntervalRef.current);
      };

      const getBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = error => reject(error);
          reader.readAsDataURL(file);
        });
      };

      const startTranscription = async () => {
        if (!file) return;
        if (!isApiKeySet || !apiKeyInput) {
          setErrorMessage("יש להזין מפתח API כדי להתחיל.");
          return;
        }
        
        setStatus('processing');
        setErrorMessage('');
        
        abortControllerRef.current = new AbortController();
        const signal = abortControllerRef.current.signal;

        const initialDrafts = Array.from({ length: iterations }, (_, i) => ({ id: i + 1, status: 'waiting', text: '' }));
        setDrafts(initialDrafts);
        setMergeState({ status: 'waiting', text: '' });

        startTimeRef.current = Date.now();
        estimatedTotalDurationRef.current = null;
        setTimeElapsed(0);
        setTimeRemaining(null);
        setProgressPercent(0);
        
        if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
        timerIntervalRef.current = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTimeRef.current) / 1000);
          setTimeElapsed(elapsed);
          if (estimatedTotalDurationRef.current !== null) {
            let remain = estimatedTotalDurationRef.current - elapsed;
            setTimeRemaining(remain > 0 ? remain : 0);
          }
        }, 1000);

        try {
          const base64Data = await getBase64(file);
          const mimeType = file.type || 'audio/mp3';
          const completedTranscriptions = [];
          let totalAudioTimeTaken = 0;

          for (let i = 0; i < iterations; i++) {
            setDrafts(prev => prev.map(d => d.id === i + 1 ? { ...d, status: 'processing' } : d));
            const iterStartTime = Date.now();
            try {
              const currentPrompt = audioPrompts[i] || defaultPromptFast;
              const currentModel = audioModels[i] || 'flash';
              
              const result = await callGeminiAudio(base64Data, mimeType, currentPrompt, currentModel, apiKeyInput, signal);
              
              const iterTimeTaken = Math.floor((Date.now() - iterStartTime) / 1000);
              totalAudioTimeTaken += iterTimeTaken;

              completedTranscriptions.push(result);
              setDrafts(prev => prev.map(d => d.id === i + 1 ? { ...d, status: 'done', text: result } : d));
              
              const avgIterTime = totalAudioTimeTaken / (i + 1);
              const mergeTimeFactor = mergeModel === 'pro' ? 0.8 : 0.3;
              const remainingIters = (iterations - (i + 1)) + mergeTimeFactor; 
              
              const totalElapsedNow = Math.floor((Date.now() - startTimeRef.current) / 1000);
              estimatedTotalDurationRef.current = totalElapsedNow + Math.floor(avgIterTime * remainingIters);
              setProgressPercent(Math.floor(((i + 1) / (iterations + 1)) * 100));

            } catch (err) {
              if (err.name === 'AbortError') throw err;
              setDrafts(prev => prev.map(d => d.id === i + 1 ? { ...d, status: 'error', text: `שגיאה: ${err.message}` } : d));
            }
          }

          if (completedTranscriptions.length === 0) throw new Error("כל ניסיונות התמלול נכשלו.");

          setMergeState({ status: 'processing', text: '' });
          
          let finalMergePrompt = `להלן ${completedTranscriptions.length} גרסאות של תמלול של קובץ השמע המצורף לבקשה זו.\n\n`;
          finalMergePrompt += mergePrompt;
          finalMergePrompt += `\n\n--- גרסאות התמלול לבדיקה והשוואה מול השמע ---\n`;
          completedTranscriptions.forEach((text, index) => {
            finalMergePrompt += `\n>>> תחילת גרסה ${index + 1} <<<\n${text}\n>>> סוף גרסה ${index + 1} <<<\n`;
          });

          const finalResult = await callGeminiMerge(base64Data, mimeType, finalMergePrompt, mergeModel, apiKeyInput, signal);
          
          setMergeState({ status: 'done', text: 'העיבוד הסתיים בהצלחה!' });
          setFinalText(finalResult);
          setProgressPercent(100);
          setTimeRemaining(0);
          clearInterval(timerIntervalRef.current);
          setTimeout(() => setStatus('done'), 1500);

        } catch (error) {
          clearInterval(timerIntervalRef.current);
          if (error.name === 'AbortError') return; 
          setErrorMessage(error.message || "אירעה שגיאה לא צפויה בתהליך.");
          setStatus('error');
        }
      };

      const stripHtml = (html) => {
        const tmp = document.createElement("DIV");
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || "";
      };

      const handleCopy = () => {
        const rawHtml = activeTab === 'final' ? finalText : drafts.map(d => `--- גרסה ${d.id} ---\n${d.text}`).join('\n\n');
        const plainText = stripHtml(rawHtml);
        const textArea = document.createElement("textarea");
        textArea.value = plainText;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setIsCopied(true);
          setTimeout(() => setIsCopied(false), 2000);
        } catch (err) {
          alert("שגיאה בהעתקת הטקסט");
        }
        document.body.removeChild(textArea);
      };

      const handleDownloadTxt = () => {
        const element = document.createElement("a");
        const rawHtml = activeTab === 'final' ? finalText : drafts.map(d => `--- גרסה ${d.id} ---\n${d.text}`).join('\n\n');
        const plainText = stripHtml(rawHtml);
        const fileBlob = new Blob([plainText], {type: 'text/plain;charset=utf-8'});
        element.href = URL.createObjectURL(fileBlob);
        element.download = activeTab === 'final' ? "תמלול_סופי.txt" : "גרסאות_גולמיות.txt";
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);

          ? finalText.replace(/\n/g, '<br>')

        const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
          <head><meta charset='utf-8'><title>תמלול תורני</title></head>
          <body dir='rtl' style='font-family: Arial, sans-serif; font-size: 14pt; line-height: 1.5;'>`;
        const footer = "</body></html>";
        const sourceHTML = header + rawHtml + footer;
        
        const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = activeTab === 'final' ? 'תמלול_סופי.doc' : 'גרסאות.doc';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

                                    value={mergeModel}
                                    onChange={(e) => setMergeModel(e.target.value)}
                                    className="text-xs p-1.5 rounded-lg border border-indigo-200 dark:border-indigo-800 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-300 font-bold outline-none focus:ring-2 focus:ring-indigo-400 shadow-sm cursor-pointer"
                                  >
                                    <option value="lite">Lite 3.1</option>
                                    <option value="flash">Flash 3.0</option>
                                    <option value="pro">Pro 3.1</option>
                                  </select>
                                </div>
                              </div>
                              <textarea 
                                value={mergePrompt}
                                onChange={(e) => setMergePrompt(e.target.value)}
                                className="w-full text-xs p-3 bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-indigo-400 resize-y min-h-[140px] shadow-inner"
                              ></textarea>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>

                    <button onClick={startTranscription} disabled={!file || !isApiKeySet} className={`group w-full py-5 rounded-2xl font-bold text-xl flex items-center justify-center gap-3 transition-all duration-300 shadow-md relative overflow-hidden ${(!file || !isApiKeySet) ? 'bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white hover:shadow-xl hover:-translate-y-1 active:translate-y-0 active:scale-95'}`}>
                      {file && isApiKeySet && <div className="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>}
                      <Icon i="play" size={26} className="transition-transform group-hover:animate-wobble" /> התחל תמלול ועיבוד
                    </button>
                  </div>
                </div>
              </section>
            )}

            {/* שלב תצוגה חיה */}
            {(status === 'processing' || status === 'error') && (
              <section className="space-y-6">
                <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-5 px-8 rounded-3xl shadow-md border border-slate-200 dark:border-slate-700">
                  <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-3">
                    <Icon i="chart-line" size={24} className="text-blue-500 animate-pulse" />
                    {status === 'processing' ? 'מעבד נתונים...' : 'שגיאה'}
                  </h2>
                  <button onClick={resetState} className="flex items-center gap-2 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 px-5 py-2.5 rounded-xl font-bold border border-red-100 dark:border-red-900/30 transition-all hover:shadow-sm active:scale-95">
                    <Icon i="times" size={20} /> ביטול וחזרה
                  </button>
                </div>
                
                <div className="bg-white dark:bg-slate-800 rounded-3xl p-8 flex flex-wrap gap-8 items-center justify-between border border-slate-200 dark:border-slate-700 shadow-sm">
                  <div className="flex-1 min-w-[200px]">
                    <div className="flex justify-between mb-3"><span className="font-bold text-slate-700 dark:text-slate-300 text-lg">התקדמות כללית</span><span className="font-bold text-blue-600 dark:text-blue-400 text-lg">{progressPercent}%</span></div>
                    <div className="w-full bg-slate-100 dark:bg-slate-900 rounded-full h-5 overflow-hidden shadow-inner p-0.5">
                      <div className="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-700 ease-out relative overflow-hidden" style={{ width: `${progressPercent}%` }}>
                         <div className="absolute inset-0 bg-white/20 w-full animate-pulse"></div>
                      </div>
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <div className="bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 p-4 rounded-2xl min-w-[130px] text-center shadow-sm">
                      <div className="flex items-center justify-center gap-1.5 text-slate-500 dark:text-slate-400 text-sm mb-1.5 font-medium"><Icon i="clock" size={16}/> זמן שעבר</div>
                      <div className="text-2xl font-mono font-bold text-slate-700 dark:text-slate-200">{formatTime(timeElapsed)}</div>
                    </div>
                    <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 p-4 rounded-2xl min-w-[130px] text-center shadow-sm relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-full h-1 bg-blue-400/20 dark:bg-blue-400/10"></div>
                      <div className="flex items-center justify-center gap-1.5 text-blue-600 dark:text-blue-400 text-sm mb-1.5 font-medium"><Icon i="hourglass-half" size={16} className="animate-spin-slow"/> זמן נותר</div>
                      <div className="text-2xl font-mono font-bold text-blue-800 dark:text-blue-300">{timeRemaining === null ? <span className="text-base tracking-widest animate-pulse">...</span> : formatTime(timeRemaining)}</div>
                    </div>
                  </div>
                </div>

                {errorMessage && (<div className="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 text-red-800 dark:text-red-200 p-5 rounded-r-none rounded-l-xl font-medium flex items-center gap-3 shadow-sm"><Icon i="exclamation-circle" size={24} className="shrink-0 animate-wobble"/> {errorMessage}</div>)}

                {status === 'processing' && (
                  <div className="text-center text-sm font-medium text-slate-500 dark:text-slate-400 bg-white/40 dark:bg-slate-800/40 py-3 rounded-xl border border-slate-200 dark:border-slate-700 border-dashed backdrop-blur-sm">
                     התהליך מבוצע במקביל כדי לחסוך זמן. לאחר יצירת הטיוטות, יתחיל שלב הסנכרון המעמיק.
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {drafts.map((draft, idx) => (
                    <div key={draft.id} className="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col transition-all hover:shadow-md">
                      <div className="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-100 dark:border-slate-700 px-5 py-4 flex justify-between items-center">
                        <h3 className="font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2">
                          גרסה {draft.id}
                          <span className="text-[10px] font-bold text-slate-500 dark:text-slate-400 border border-slate-300 dark:border-slate-600 px-2 py-0.5 rounded-md bg-white dark:bg-slate-800 shadow-sm">
                            <ModelLabel mode={audioModels[idx]} />
                          </span>
                        </h3>
                        {draft.status === 'processing' && <span className="text-xs bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 px-2.5 py-1 rounded-md flex items-center gap-1.5 font-medium"><Icon i="sync-alt" size={14} className="animate-spin" /> מעבד...</span>}
                        {draft.status === 'done' && <span className="text-xs bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300 px-2.5 py-1 rounded-md flex items-center gap-1.5 font-medium"><Icon i="check-circle" size={14} className="animate-tada"/> הושלם</span>}
                      </div>
                      <div className="p-5 flex-1 bg-slate-50/30 dark:bg-slate-900/20 min-h-[220px]">
                        {draft.status === 'done' && <TypewriterText text={draft.text} />}
                        {draft.status === 'processing' && (
                          <div className="h-full flex flex-col items-center justify-center text-blue-400 dark:text-blue-500">
                            <div className="relative">
                              <Icon i="microchip" size={48} className="animate-bounce-cute relative z-10" />
                              <div className="absolute inset-0 bg-blue-400 dark:bg-blue-600 blur-xl opacity-30 rounded-full animate-pulse"></div>
                            </div>
                            <span className="mt-4 font-medium text-sm text-blue-500/80 dark:text-blue-400/80 animate-pulse">מחלץ טקסט...</span>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                  
                  <div className={`rounded-3xl shadow-md border overflow-hidden flex flex-col md:col-span-2 lg:col-span-1 transition-all duration-500 ${mergeModel === 'pro' ? 'bg-gradient-to-b from-indigo-50 dark:from-indigo-900/20 to-white dark:to-slate-800 border-indigo-200 dark:border-indigo-800' : 'bg-gradient-to-b from-blue-50 dark:from-blue-900/20 to-white dark:to-slate-800 border-blue-200 dark:border-blue-800'} ${mergeState.status === 'processing' ? 'shadow-lg scale-[1.02] ring-2 ring-indigo-500/20 dark:ring-indigo-500/40' : ''}`}>
                    <div className={`${mergeModel === 'pro' ? 'bg-indigo-900 dark:bg-indigo-950' : (mergeModel === 'lite' ? 'bg-sky-900 dark:bg-sky-950' : 'bg-blue-900 dark:bg-blue-950')} text-white px-5 py-4 flex justify-between items-center shadow-sm`}>
                      <h3 className="font-bold flex items-center gap-2 text-lg">
                        <Icon i="brain" size={20} className={mergeState.status === 'processing' ? 'animate-heartbeat' : ''} /> סנכרון סופי 
                        <span className="text-xs font-bold opacity-90 border border-white/40 bg-white/10 px-2 py-0.5 rounded-md ml-1 backdrop-blur-sm"><ModelLabel mode={mergeModel} /></span>
                      </h3>
                    </div>
                    <div className="p-6 flex-1 flex flex-col items-center justify-center min-h-[220px] text-center relative overflow-hidden">
                       {mergeState.status === 'waiting' && <p className="text-slate-400 dark:text-slate-500 text-sm font-medium">ימתין לסיום כל טיוטות הגרסאות להאזנה והשוואה משוקללת</p>}
                       {mergeState.status === 'processing' && (
                         <div className="flex flex-col items-center z-10">
                            <Icon i="brain" size={56} className={`mb-4 ${mergeModel === 'pro' ? 'text-indigo-500 animate-heartbeat' : 'text-blue-500 animate-heartbeat'}`} />
                            
                            <div className="flex items-end justify-center gap-1.5 h-10 mb-4 opacity-80">
                              <div className="w-1.5 bg-indigo-400 dark:bg-indigo-500 rounded-full animate-wave"></div>
                              <div className="w-1.5 bg-indigo-500 dark:bg-indigo-400 rounded-full animate-wave"></div>
                              <div className="w-1.5 bg-indigo-600 dark:bg-indigo-300 rounded-full animate-wave"></div>
                              <div className="w-1.5 bg-indigo-500 dark:bg-indigo-400 rounded-full animate-wave"></div>
                              <div className="w-1.5 bg-indigo-400 dark:bg-indigo-500 rounded-full animate-wave"></div>
                            </div>

                            <p className={`font-bold text-base ${mergeModel === 'pro' ? 'text-indigo-800 dark:text-indigo-300' : 'text-blue-800 dark:text-blue-300'}`}>מאזין למקור ומשווה גרסאות...</p>
                         </div>
                       )}
                       {mergeState.status === 'done' && (
                         <div className="text-green-600 dark:text-green-400 animate-in zoom-in duration-500">
                            <div className="bg-green-100 dark:bg-green-900/50 p-4 rounded-full inline-block mb-3 shadow-inner">
                              <Icon i="check-circle" size={56} className="animate-tada" />
                            </div>
                            <p className="font-bold text-xl">הושלם בהצלחה!</p>
                         </div>
                       )}
                    </div>
                  </div>
                </div>
              </section>
            )}

            {/* שלב תוצאה */}
            {status === 'done' && (
              <section className="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden animate-in fade-in slide-in-from-bottom-8 duration-700">
                
                <div className="bg-slate-100 dark:bg-slate-950 flex items-center justify-between px-2 pt-2 border-b border-slate-200 dark:border-slate-800 overflow-x-auto">
                  <div className="flex gap-2 min-w-max">
                    <button 
                      onClick={() => setActiveTab('final')}
                      className={`px-8 py-4 font-bold text-sm md:text-base flex items-center gap-2 rounded-t-2xl transition-all ${activeTab === 'final' ? 'bg-white dark:bg-slate-900 text-blue-700 dark:text-blue-400 border-t-4 border-blue-600 dark:border-blue-500 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-10 relative' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200'}`}
                    >
                      <Icon i="file-alt" size={20} className={activeTab === 'final' ? 'text-blue-600 dark:text-blue-400 animate-bounce-cute' : ''} /> מסמך סופי משולב
                    </button>
                    <button 
                      onClick={() => setActiveTab('raw')}
                      className={`px-8 py-4 font-bold text-sm md:text-base flex items-center gap-2 rounded-t-2xl transition-all ${activeTab === 'raw' ? 'bg-white dark:bg-slate-900 text-indigo-700 dark:text-indigo-400 border-t-4 border-indigo-600 dark:border-indigo-500 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-10 relative' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200'}`}
                    >
                      <Icon i="layer-group" size={20} className={activeTab === 'raw' ? 'text-indigo-600 dark:text-indigo-400 animate-bounce-cute' : ''} /> רשימת טיוטות גולמיות
                    </button>
                  </div>
                  <div className="flex items-center gap-2 pb-3 pl-4">
                    <button onClick={resetState} className="flex items-center gap-2 text-slate-600 dark:text-slate-300 hover:text-blue-700 dark:hover:text-blue-400 bg-white dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/30 px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 text-sm font-bold transition-all shadow-sm active:scale-95">
                      <Icon i="arrow-right" size={18} className="animate-wobble" /> התחל מחדש
                    </button>
                  </div>
                </div>

                <div className="bg-white dark:bg-slate-900 p-4 px-6 flex flex-wrap gap-4 justify-between items-center border-b border-slate-100 dark:border-slate-800 shadow-sm relative z-10">
                   <span className="text-sm text-slate-500 dark:text-slate-400 font-medium">
                     {activeTab === 'final' ? 'טקסט רציף מתוקן. חלופות קריאה מסומנות בזרחן. (ניתן לערוך ידנית)' : `מוצגות ${iterations} טיוטות שנוצרו על ידי המערכת טרם שלב הסיכום`}
                   </span>
                   <div className="flex flex-wrap items-center gap-2">
                      <div className="flex bg-slate-100 dark:bg-slate-800 rounded-lg p-1 border border-slate-200 dark:border-slate-700">
                        <button onClick={() => setFontSize(prev => Math.min(prev + 2, 32))} className="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md text-slate-600 dark:text-slate-300 transition-colors shadow-sm" title="הגדל"><Icon i="search-plus" size={18} /></button>
                        <button onClick={() => setFontSize(prev => Math.max(prev - 2, 12))} className="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md text-slate-600 dark:text-slate-300 transition-colors shadow-sm ml-1" title="הקטן"><Icon i="search-minus" size={18} /></button>
                      </div>
                      
                      <div className="w-px h-8 bg-slate-200 dark:bg-slate-700 mx-2"></div>
                      
                      <button onClick={handleCopy} className="px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-xl font-bold text-sm flex items-center gap-2 border border-slate-200 dark:border-slate-700 transition-all active:scale-95 shadow-sm">
                        {isCopied ? <Icon i="check" size={18} className="text-green-600 dark:text-green-400 animate-in zoom-in"/> : <Icon i="copy" size={18} className="animate-wobble"/>} {isCopied ? 'הועתק!' : 'העתק'}
                      </button>
                      
                      <div className="flex bg-blue-50/50 dark:bg-blue-900/20 rounded-xl p-1 border border-blue-100 dark:border-blue-800/50 shadow-sm">
                        <button onClick={handleDownloadTxt} className="px-4 py-2 hover:bg-white dark:hover:bg-slate-800 text-blue-700 dark:text-blue-400 rounded-lg font-bold text-sm flex items-center gap-2 transition-all hover:shadow-sm" title="שמור כטקסט פשוט (מסיר את הצבע הצהוב)">
                          <Icon i="download" size={18} className="animate-bounce-cute"/> TXT
                        </button>
                        <div className="w-px bg-blue-200/50 dark:bg-blue-800/50 my-2"></div>
                        <button onClick={handleDownloadWord} className="px-4 py-2 hover:bg-white dark:hover:bg-slate-800 text-blue-700 dark:text-blue-400 rounded-lg font-bold text-sm flex items-center gap-2 transition-all hover:shadow-sm" title="שמור מסמך Word (שומר על עיצוב הזרחן והשורות)">
                          <Icon i="file-word" size={18} className="animate-bounce-cute"/> Word
                        </button>
                        <div className="w-px bg-blue-200/50 dark:bg-blue-800/50 my-2"></div>
                        <button onClick={handlePrintPdf} className="px-4 py-2 hover:bg-white dark:hover:bg-slate-800 text-blue-700 dark:text-blue-400 rounded-lg font-bold text-sm flex items-center gap-2 transition-all hover:shadow-sm" title="פתח חלונית הדפסה. ניתן לבחור 'שמור כ-PDF'">
                          <Icon i="print" size={18} className="animate-bounce-cute"/> PDF / הדפס
                        </button>
                      </div>
                   </div>
                </div>

                <div className="bg-slate-50/50 dark:bg-slate-950/50">
                  {activeTab === 'final' ? (
                    <div
                      className="print-content w-full h-[65vh] min-h-[500px] overflow-y-auto p-8 md:p-12 bg-white dark:bg-slate-900 focus:ring-4 focus:ring-blue-500/10 outline-none text-slate-800 dark:text-slate-100
                        [&_mark]:bg-yellow-200 dark:[&_mark]:bg-yellow-500/30 [&_mark]:text-yellow-900 dark:[&_mark]:text-yellow-200 [&_mark]:px-1.5 [&_mark]:mx-1 [&_mark]:rounded-md [&_mark]:font-medium [&_mark]:cursor-text [&_mark]:shadow-sm hover:[&_mark]:bg-yellow-300 dark:hover:[&_mark]:bg-yellow-500/50 transition-colors custom-scrollbar leading-relaxed"
                      contentEditable={true}
                      suppressContentEditableWarning={true}
                      onBlur={(e) => setFinalText(e.currentTarget.innerHTML)}
                      dangerouslySetInnerHTML={{ __html: finalText }}
                      style={{ fontSize: `${fontSize}px` }}
                    />
                  ) : (
                    <div className="print-content h-[65vh] min-h-[500px] overflow-y-auto p-8 space-y-8 bg-slate-100/50 dark:bg-slate-950/50 custom-scrollbar">
                      {drafts.map((draft, idx) => (
                        <div key={draft.id} className="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 hover:shadow-md transition-shadow">
                          <h4 className="font-bold text-indigo-700 dark:text-indigo-400 mb-5 border-b border-indigo-100 dark:border-indigo-900/50 pb-3 flex items-center gap-3 text-lg">
                             <span className="bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300 w-8 h-8 flex items-center justify-center rounded-lg shadow-sm">{idx + 1}</span>
                             גרסה גולמית
                             <span className="text-xs font-bold text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-2.5 py-1 rounded-md mr-auto shadow-sm">
                               עובד על ידי <ModelLabel mode={audioModels[idx]} />
                             </span>
                          </h4>
                          <p style={{ fontSize: `${fontSize}px`, lineHeight: '1.9' }} className="text-slate-700 dark:text-slate-300 whitespace-pre-wrap">
                            {draft.text}
                          </p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                
              </section>
            )}
          </main>

          <footer className="max-w-6xl mx-auto mt-12 py-8 text-center text-slate-400 dark:text-slate-500 text-sm border-t border-slate-200/60 dark:border-slate-800/60 relative z-10">
            <p>כל הזכויות שמורות &copy; {new Date().getFullYear()}</p>
            <p className="mt-1.5">
              פותח על ידי{' '}
              <a 
                href="https://lev-good.github.io/Good-heart/" 
                target="_blank" 
                rel="noopener noreferrer"
                className="text-blue-500 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 hover:underline font-bold transition-colors"
              >
                לב טוב
              </a>
            </p>
          </footer>
        </div>
      );
    }

    // ציור האפליקציה למסך
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
